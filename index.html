<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Calendar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="background"></div>

<div class="calendar-container">
  <h1 id="monthYear"></h1>

  <div class="days">
    <div>Sun</div>
    <div>Mon</div>
    <div>Tue</div>
    <div>Wed</div>
    <div>Thu</div>
    <div>Fri</div>
    <div>Sat</div>
  </div>

  <div id="calendar"></div>

  <div id="quote"></div>
</div>

<script src="script.js"></script>

</body>
</html>
