<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Calendar</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="background"></div>
    <div id="overlay"></div>

    <!-- Stars -->
    <div class="star star1"></div>
    <div class="star star2"></div>
    <div class="star star3"></div>

    <!-- Flying Butterflies -->
    <div class="butterfly butterfly1">🦋</div>
    <div class="butterfly butterfly2">🦋</div>
    <div class="butterfly butterfly3">🦋</div>
    <div class="butterfly butterfly4">🦋</div>

    <!-- Running Puppies -->
    <div class="puppy puppy1">🐕</div>
    <div class="puppy puppy2">🐶</div>
    <div class="puppy puppy3">🐕</div>

    <!-- Blushing Hearts -->
    <div class="heart heart1">💕</div>
    <div class="heart heart2">💗</div>
    <div class="heart heart3">💖</div>
    <div class="heart heart4">💕</div>

    <main class="app">

        <div class="month-wrapper glass">
            <h1 id="monthYear"></h1>
        </div>

        <section class="calendar-section glass">

            <div class="weekdays">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>

            <div id="calendar"></div>

            <div class="quote-wrapper">
                <p id="quote"></p>
                <span id="author"></span>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
